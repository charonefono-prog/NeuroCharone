<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Acesso - Neuromodulação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-form button {
            background: none;
            color: #667eea;
            padding: 0;
            font-weight: 600;
            text-decoration: underline;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
        }

        .success {
            color: #27ae60;
            font-size: 13px;
            margin-top: 5px;
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .dashboard-header h2 {
            color: #333;
            font-size: 20px;
        }

        .logout-btn {
            background: #e74c3c;
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
        }

        .user-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            flex: 1;
        }

        .user-email {
            color: #333;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-status {
            color: #999;
            font-size: 12px;
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            border-radius: 6px;
        }

        .btn-approve {
            background: #27ae60;
        }

        .btn-reject {
            background: #e74c3c;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            background: none;
            color: #999;
            padding: 10px 20px;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="container" id="loginContainer">
        <div class="logo">
            <h1>🔐 Acesso</h1>
            <p>Sistema de Neuromodulação</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <input type="password" id="loginPassword" required>
            </div>
            <div id="loginError" class="error"></div>
            <button type="submit">Entrar</button>
        </form>

        <div class="toggle-form">
            Não tem conta? <button type="button" onclick="toggleForms()">Registre-se</button>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="container hidden" id="registerContainer">
        <div class="logo">
            <h1>📝 Registro</h1>
            <p>Crie sua conta</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="registerName">Nome</label>
                <input type="text" id="registerName" required>
            </div>
            <div class="form-group">
                <label for="registerEmail">Email</label>
                <input type="email" id="registerEmail" required>
            </div>
            <div class="form-group">
                <label for="registerPassword">Senha</label>
                <input type="password" id="registerPassword" required>
            </div>
            <div class="form-group">
                <label for="registerPasswordConfirm">Confirme a Senha</label>
                <input type="password" id="registerPasswordConfirm" required>
            </div>
            <div id="registerError" class="error"></div>
            <div id="registerSuccess" class="success"></div>
            <button type="submit">Registrar</button>
        </form>

        <div class="toggle-form">
            Já tem conta? <button type="button" onclick="toggleForms()">Faça login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="container dashboard" id="dashboard">
        <div class="dashboard-header">
            <h2>👤 Bem-vindo, <span id="userName"></span></h2>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div id="userDashboard" style="display: none;">
            <p style="color: #666; text-align: center; padding: 30px 0;">
                ✅ Sua conta foi aprovada! Você tem acesso ao sistema.
            </p>
        </div>

        <div id="adminDashboard" style="display: none;">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('pending')">⏳ Pendentes</button>
                <button class="tab-btn" onclick="switchTab('approved')">✅ Aprovados</button>
                <button class="tab-btn" onclick="switchTab('blocked')">🚫 Bloqueados</button>
            </div>

            <div class="tab-content active" id="pendingTab">
                <div id="pendingList"></div>
            </div>

            <div class="tab-content" id="approvedTab">
                <div id="approvedList"></div>
            </div>

            <div class="tab-content" id="blockedTab">
                <div id="blockedList"></div>
            </div>
        </div>

        <div id="pendingApprovalDashboard" style="display: none;">
            <p style="color: #f39c12; text-align: center; padding: 30px 0;">
                ⏳ Sua conta está aguardando aprovação do administrador.
            </p>
        </div>

        <div id="blockedDashboard" style="display: none;">
            <p style="color: #e74c3c; text-align: center; padding: 30px 0;">
                🚫 Sua conta foi bloqueada.
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api/pwa';

        // Toggle between login and register forms
        function toggleForms() {
            document.getElementById('loginContainer').classList.toggle('hidden');
            document.getElementById('registerContainer').classList.toggle('hidden');
        }

        // Register
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;

            if (password !== passwordConfirm) {
                document.getElementById('registerError').textContent = 'As senhas não conferem';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registerSuccess').textContent = '✅ Registro realizado! Aguarde aprovação.';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => toggleForms(), 2000);
                } else {
                    document.getElementById('registerError').textContent = data.error || 'Erro no registro';
                }
            } catch (error) {
                document.getElementById('registerError').textContent = 'Erro de conexão';
            }
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard();
                } else {
                    document.getElementById('loginError').textContent = data.error || 'Erro no login';
                }
            } catch (error) {
                document.getElementById('loginError').textContent = 'Erro de conexão';
            }
        });

        // Show Dashboard
        function showDashboard() {
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('userName').textContent = user.name;

            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('registerContainer').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');

            if (user.role === 'admin') {
                document.getElementById('adminDashboard').style.display = 'block';
                loadUsers();
            } else if (user.status === 'approved') {
                document.getElementById('userDashboard').style.display = 'block';
            } else if (user.status === 'pending') {
                document.getElementById('pendingApprovalDashboard').style.display = 'block';
            } else if (user.status === 'blocked') {
                document.getElementById('blockedDashboard').style.display = 'block';
            }
        }

        // Load Users
        async function loadUsers() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                const pending = data.filter(u => u.status === 'pending');
                const approved = data.filter(u => u.status === 'approved');
                const blocked = data.filter(u => u.status === 'blocked');

                renderUsers(pending, 'pendingList');
                renderUsers(approved, 'approvedList', false);
                renderUsers(blocked, 'blockedList', false);
            } catch (error) {
                console.error('Erro ao carregar usuários:', error);
            }
        }

        // Render Users
        function renderUsers(users, containerId, showActions = true) {
            const container = document.getElementById(containerId);
            if (users.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhum usuário</div>';
                return;
            }

            container.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-info">
                        <div class="user-email">${user.name}</div>
                        <div class="user-status">${user.email}</div>
                    </div>
                    ${showActions ? `
                        <div class="user-actions">
                            <button class="btn-small btn-approve" onclick="approveUser('${user.id}')">Aprovar</button>
                            <button class="btn-small btn-reject" onclick="rejectUser('${user.id}')">Rejeitar</button>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // Approve User
        async function approveUser(userId) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId })
                });

                if (response.ok) {
                    loadUsers();
                }
            } catch (error) {
                console.error('Erro ao aprovar usuário:', error);
            }
        }

        // Reject User
        async function rejectUser(userId) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`${API_URL}/reject`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId })
                });

                if (response.ok) {
                    loadUsers();
                }
            } catch (error) {
                console.error('Erro ao rejeitar usuário:', error);
            }
        }

        // Switch Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            location.reload();
        }

        // Check if logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            if (token) {
                showDashboard();
            }
        });
    </script>
</body>
</html>
